<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lưu Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Thông tin Sản Phẩm</h4>
                </div>
                <div class="card-body">
                    
                    <form th:action="@{${actionUrl}}" th:object="${productDTO}" method="POST">
                        
                        <div class="mb-3">
                            <label class="form-label">Tên Sản Phẩm:</label>
                            <input type="text" class="form-control" th:field="*{proName}" required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Thứ Tự (Order):</label>
                            <input type="number" class="form-control" th:field="*{order}" required />
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" th:field="*{active}" id="activeCheck" />
                            <label class="form-check-label" for="activeCheck">Đang hoạt động (Active)</label>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/products}" class="btn btn-secondary">Quay lại</a>
                            <button type="submit" class="btn btn-success">Lưu dữ liệu</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
